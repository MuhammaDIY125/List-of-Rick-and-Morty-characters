name: list_of_rick_and_morty_characters
description: "List of Rick and Morty characters"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Networking
  dio: ^5.8.0+1

  # Local database
  isar_community: ^3.3.0
  isar_community_flutter_libs: ^3.3.0

  # Dependency injection
  get_it: ^9.2.1

  # JSON Serialization
  json_annotation: ^4.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  isar_community_generator: ^3.3.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
